<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cartera — Iniciando</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    .contenedor {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    .icono {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      box-shadow: 0 20px 40px rgba(99, 102, 241, 0.35);
    }
    .nombre {
      font-size: 1.75rem;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.02em;
    }
    .sub {
      font-size: 0.875rem;
      color: #64748b;
      margin-top: -0.75rem;
    }
    .spinner-wrapper {
      position: relative;
      width: 40px;
      height: 40px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(99, 102, 241, 0.2);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: girar 0.8s linear infinite;
    }
    @keyframes girar { to { transform: rotate(360deg); } }
    .version {
      position: fixed;
      bottom: 1.25rem;
      font-size: 0.75rem;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <div class="icono">💳</div>
    <div class="nombre">Cartera</div>
    <div class="sub">Iniciando sistema...</div>
    <div class="spinner-wrapper">
      <div class="spinner"></div>
    </div>
  </div>
  <div class="version">v1.0.0</div>
</body>
</html>
